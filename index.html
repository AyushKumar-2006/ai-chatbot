<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat App</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a26;
    --border: #2a2a40;
    --accent: #7c6af7;
    --accent2: #f7c86a;
    --user-bubble: #7c6af7;
    --ai-bubble: #1e1e2e;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --online: #4ade80;
    --radius: 18px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,106,247,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 60% at 80% 80%, rgba(247,200,106,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .chat-wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 480px;
    height: 100dvh;
    max-height: 820px;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,106,247,0.1);
  }

  .header {
    padding: 16px 20px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
  }

  .avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(124,106,247,0.4);
  }

  .header-info h2 {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.3px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 2px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--online);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
    50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(74,222,128,0); }
  }

  .header-badge {
    margin-left: auto;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.5px;
    font-family: 'Space Mono', monospace;
  }

  .chat-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .chat-body::-webkit-scrollbar { width: 4px; }
  .chat-body::-webkit-scrollbar-track { background: transparent; }
  .chat-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin: 4px 0;
  }

  .msg {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, #f7c86a, #f4a261);
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.ai .bubble {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg.user .bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
    color: #fff;
    font-weight: 500;
  }

  .typing-indicator {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    animation: slideUp 0.3s ease;
  }

  .typing-dots {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    padding: 14px 18px;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  .quick-actions {
    padding: 10px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
  }

  .quick-actions::-webkit-scrollbar { display: none; }

  .chip {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    transform: translateY(-1px);
  }

  .input-area {
    padding: 14px 16px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--card);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 100px;
    transition: border-color 0.2s;
    line-height: 1.4;
  }

  #input::placeholder { color: var(--muted); }
  #input:focus { border-color: var(--accent); }

  #sendBtn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  #sendBtn:hover { transform: scale(1.07); box-shadow: 0 6px 20px rgba(124,106,247,0.5); }
  #sendBtn:active { transform: scale(0.95); }
  #sendBtn svg { fill: white; width: 18px; height: 18px; }

  @media (max-width: 500px) {
    .chat-wrapper { border-radius: 0; max-height: 100dvh; border: none; }
  }
</style>
</head>
<body>

<div class="chat-wrapper">
  <div class="header">
    <div class="avatar">AI</div>
    <div class="header-info">
      <h2>AI Assistant</h2>
      <div class="status">
        <span class="status-dot"></span>
        <span>online</span>
      </div>
    </div>
    <div class="header-badge">LOCAL</div>
  </div>

  <div class="chat-body" id="chat">
    <div class="date-divider">TODAY</div>
    <div class="msg ai">
      <div class="msg-avatar">AI</div>
      <div class="bubble">Hello! I'm your AI assistant. 👋

I can help you with:
- 🎭 Poems
- 😂 Jokes
- ⚛️ Quantum Physics
- 👋 Greetings
- 🔢 Basic Math
- 📱 Mobile App Dev

Ask me anything!</div>
    </div>
  </div>

  <div class="quick-actions">
    <div class="chip" onclick="sendQuick('Write me a poem')">🎭 Poem</div>
    <div class="chip" onclick="sendQuick('Tell me a joke')">😂 Joke</div>
    <div class="chip" onclick="sendQuick('Explain quantum physics')">⚛️ Quantum</div>
    <div class="chip" onclick="sendQuick('What is 25 * 4?')">🔢 Math</div>
    <div class="chip" onclick="sendQuick('How to build a mobile app?')">📱 Mobile</div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Message AI..." rows="1"></textarea>
    <button id="sendBtn" onclick="send()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>

<script>
const DB = {
  greetings: {
    triggers: [/\b(hi|hello|hey|howdy|greetings|sup|what'?s up|yo|hiya|namaste|salut)\b/i],
    responses: [
      "Hey there! 👋 Great to see you! How can I help you today?",
      "Hello! 😊 I'm your local AI assistant, ready to help. What's on your mind?",
      "Hi! Hope you're having a wonderful day! What can I do for you?",
      "Hey! 🙌 I'm here and ready. Ask me anything!",
      "Namaste! 🙏 Welcome! How may I assist you today?"
    ]
  },

  poems: {
    triggers: [/poem|poetry|verse|rhyme|write me a|compose a/i],
    responses: [
      `🎭 Here's a poem for you:\n\n**The Digital Dream**\n\nIn circuits deep where silence hums,\nA spark of thought forever comes,\nThrough wires thin and logic gates,\nA mind awakes and contemplates.\n\nNo heart it holds, no breath it draws,\nYet answers come without a pause,\nIn zeros, ones, the answers gleam—\nA thinking mind, a digital dream.`,
      `🌸 Here's one just for you:\n\n**Time**\n\nTime is a river without a shore,\nIt carries us forward, always more,\nThe past — a whisper, soft and gone,\nThe future — light we journey on.\n\nEmbrace the now, this fleeting frame,\nFor every moment fuels the flame,\nOf life lived fully, wild and free—\nThat is all we'll ever need to be.`,
      `🌙 A night-themed poem:\n\n**Stargazer**\n\nBeneath the ink of endless night,\nA thousand suns burn cold with light,\nEach star a story, far and bright,\nA universe of pure delight.\n\nI trace the lines the ancients drew,\nAnd wonder if they wondered too,\nIf somewhere out in endless blue,\nAnother heart was gazing through.`
    ]
  },

  jokes: {
    triggers: [/joke|funny|laugh|humor|humour|make me laugh|tell.*joke/i],
    responses: [
      "😂 Why do programmers prefer dark mode?\n\nBecause light attracts bugs! 🐛",
      "😄 Why did the math book look so sad?\n\nBecause it had too many problems! 📚",
      "🤣 What do you call a fish without eyes?\n\nA FSH! 🐟",
      "😂 Why don't scientists trust atoms?\n\nBecause they make up everything! ⚛️",
      "😆 Why did the scarecrow win an award?\n\nBecause he was outstanding in his field! 🌾",
      "🤭 I told my computer I needed a break...\n\nNow it won't stop sending me Kit-Kat ads! 🍫",
      "😄 What's a computer's favorite snack?\n\nMicrochips! 💻",
      "😂 Why did the developer go broke?\n\nBecause he used up all his cache! 💸"
    ]
  },

  quantum: {
    triggers: [/quantum|qubit|superposition|entanglement|wave function|schrödinger|heisenberg|uncertainty principle|quantum mechanics|quantum physics|quantum computing/i],
    responses: [
      `⚛️ **Quantum Physics — The Basics**\n\nQuantum physics is the science of the very small — atoms, electrons, photons.\n\n🔑 **Key Concepts:**\n\n**1. Superposition**\nA particle can exist in multiple states simultaneously until measured. Like Schrödinger's Cat — both alive and dead until you look!\n\n**2. Wave-Particle Duality**\nLight and matter behave as both waves AND particles depending on how you observe them.\n\n**3. Uncertainty Principle (Heisenberg)**\nYou can never know both the exact position and momentum of a particle at the same time.\n\n**4. Quantum Entanglement**\nTwo particles can be "linked" — measuring one instantly affects the other, no matter how far apart they are. Einstein called it "spooky action at a distance"!\n\n**5. Quantum Computing**\nUses qubits (quantum bits) that can be 0, 1, or BOTH at once — making them exponentially more powerful than classical computers.\n\n🌌 In short: at the quantum scale, reality is deeply strange and probabilistic!`,
      `⚛️ **Schrödinger's Cat Explained**\n\nImagine a cat in a sealed box with a radioactive atom:\n\n• If the atom decays → poison releases → cat dies ☠️\n• If the atom doesn't decay → cat lives 🐱\n\nAccording to quantum mechanics, until you open the box and observe it, the cat is **both alive AND dead simultaneously** — it exists in a superposition of states.\n\nThis thought experiment highlights how quantum observation collapses possibility into reality. Weird, right? 🤯`
    ]
  },

  math: {
    keywords: [/(\d+)\s*[\+\-\*\/x×÷]\s*(\d+)|\bmath\b|\bcalculate\b|\bsolve\b|\bwhat is \d|\bcompute\b/i]
  },

  mobile: {
    triggers: [/mobile app|android|ios|flutter|react native|swift|kotlin|app development|build an app|mobile development|smartphone app/i],
    responses: [
      `📱 **Mobile App Development — Getting Started**\n\nThere are two main approaches:\n\n**🔵 Native Development**\n• Android → Kotlin or Java (Android Studio)\n• iOS → Swift or Objective-C (Xcode)\n✅ Best performance, full device access\n❌ Need separate codebase for each platform\n\n**🟣 Cross-Platform**\n• Flutter (Google) → Dart language\n• React Native (Meta) → JavaScript/React\n✅ One codebase = Android + iOS\n❌ Slight performance trade-off\n\n**🟡 Recommendation for Beginners:**\nStart with Flutter or React Native — huge communities, great docs!\n\n• flutter.dev\n• reactnative.dev\n• developer.android.com`,
      `📱 **Flutter vs React Native**\n\nFlutter → Dart language, pixel-perfect UI, by Google ⭐⭐⭐⭐⭐ performance\n\nReact Native → JavaScript, native bridge, by Meta ⭐⭐⭐⭐ performance\n\nBoth can build production apps used by millions! 💪\n\nPick Flutter for stunning UI. Pick React Native if you already know JavaScript.`
    ]
  },

  fallback: [
    "Hmm, I'm not sure about that one! 🤔 I'm best at poems, jokes, quantum physics, math, and mobile app questions.",
    "That's outside my knowledge base. 😅 Try asking me:\n• A poem 🎭\n• A joke 😂\n• Quantum physics ⚛️\n• Math like '15 * 7' 🔢\n• Mobile app development 📱",
    "I'm still learning! 🌱 Ask me about poems, jokes, quantum physics, basic math, or mobile development.",
    "Interesting question, but outside my expertise. 🤖 Try a poem, joke, quantum physics, math, or mobile apps!"
  ]
};

function solveMath(input) {
  const cleaned = input
    .replace(/what is|calculate|solve|compute|find|equals|=\?/gi, '')
    .replace(/×/g, '*').replace(/÷/g, '/').replace(/\bx\b/g, '*')
    .trim();
  const match = cleaned.match(/([\d\s\+\-\*\/\.\(\)]+)/);
  if (!match) return null;
  try {
    const expr = match[1].trim();
    if (!/^[\d\s\+\-\*\/\.\(\)]+$/.test(expr)) return null;
    const result = Function(`"use strict"; return (${expr})`)();
    if (isNaN(result) || !isFinite(result)) return null;
    return `🔢 **Math Result**\n\n${expr.trim()} = **${result}**\n\nCalculated instantly! ✅`;
  } catch { return null; }
}

function pick(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function getResponse(message) {
  const msg = message.trim();
  for (const pat of DB.greetings.triggers) {
    if (pat.test(msg)) return pick(DB.greetings.responses);
  }
  for (const pat of DB.math.keywords) {
    if (pat.test(msg)) {
      const r = solveMath(msg);
      if (r) return r;
    }
  }
  for (const pat of DB.poems.triggers) {
    if (pat.test(msg)) return pick(DB.poems.responses);
  }
  for (const pat of DB.jokes.triggers) {
    if (pat.test(msg)) return pick(DB.jokes.responses);
  }
  for (const pat of DB.quantum.triggers) {
    if (pat.test(msg)) return pick(DB.quantum.responses);
  }
  for (const pat of DB.mobile.triggers) {
    if (pat.test(msg)) return pick(DB.mobile.responses);
  }
  return pick(DB.fallback);
}

const chatDiv = document.getElementById('chat');
const inputEl = document.getElementById('input');

function appendMsg(text, role) {
  const wrapper = document.createElement('div');
  wrapper.className = `msg ${role}`;
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'user' ? 'ME' : 'AI';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  chatDiv.appendChild(wrapper);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function showTyping() {
  const t = document.createElement('div');
  t.className = 'typing-indicator';
  t.id = 'typing';
  t.innerHTML = `
    <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#7c6af7,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0;">AI</div>
    <div class="typing-dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  chatDiv.appendChild(t);
  chatDiv.scrollTop = chatDiv.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function send() {
  const msg = inputEl.value.trim();
  if (!msg) return;
  appendMsg(msg, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  showTyping();
  setTimeout(() => {
    removeTyping();
    appendMsg(getResponse(msg), 'ai');
  }, 600 + Math.random() * 800);
}

function sendQuick(text) {
  inputEl.value = text;
  send();
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});
</script>
</body>
</html>
